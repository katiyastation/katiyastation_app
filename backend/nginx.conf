worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

  # ── Redirect HTTP -> HTTPS (and serve Certbot ACME challenges) ──
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS reverse proxy to the NestJS API + Socket.IO ──
  server {
    listen 443 ssl;
    server_name _;

    # Replace with your real domain's certs once Certbot has issued them.
    ssl_certificate     /etc/letsencrypt/live/api.katiyastation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.katiyastation.com/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    limit_req zone=api_limit burst=40 nodelay;

    # Socket.IO WebSocket upgrade
    location /socket.io/ {
      proxy_pass http://nestjs_api:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 86400;
    }

    location / {
      proxy_pass http://nestjs_api:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
