name: katiya_station_rms
description: Katiya Station Restaurant & Bar - Complete Restaurant Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP Client (replaces Supabase client)
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # WebSocket / Realtime (replaces Supabase Realtime)
  socket_io_client: ^3.0.1

  # Firebase (FCM Push Notifications)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # Offline Database (Isar)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Secure Token Storage
  flutter_secure_storage: ^9.2.2

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  gap: ^3.0.1

  # Premium Design Libraries
  pluto_grid: ^8.0.0
  skeletonizer: ^2.1.3
  lottie: ^3.3.0
  responsive_framework: ^1.5.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.3

  # File & Excel
  excel: ^4.0.6
  file_picker: ^8.0.7
  path_provider: ^2.1.3

  # Printing (ESC/POS)
  flutter_pos_printer_platform_image_3: ^1.2.3
  esc_pos_utils_plus: ^2.0.4

  # JSON Serialization
  json_annotation: ^4.9.0
  pdf: ^3.12.0
  printing: ^5.14.3
  file_saver: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
