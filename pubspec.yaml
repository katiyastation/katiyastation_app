name: katiya_station_rms
description: Katiya Station Restaurant & Bar - Complete Restaurant Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Supabase (backend + realtime)
  supabase_flutter: ^2.5.0

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  gap: ^3.0.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.3

  # File & Excel
  excel: ^4.0.6
  file_picker: ^8.0.7
  path_provider: ^2.1.3

  # Printing (ESC/POS)
  flutter_pos_printer_platform_image_3: ^1.2.3
  esc_pos_utils_plus: ^2.0.4

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # HTTP
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
